apiVersion: v1
kind: Service
metadata:
  name: healing-app
  namespace: self-healing
  labels:
    app: healing-app
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
spec:
  selector:
    app: healing-app
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: healing-app-nodeport
  namespace: self-healing
spec:
  selector:
    app: healing-app
  ports:
    - name: http
      port: 80
      targetPort: 8080
      nodePort: 30090
  type: NodePort
---
# PodDisruptionBudget: allow at most 1 pod down during voluntary disruptions.
# minAvailable equal to the replica count (e.g. 2 of 2 at HPA's minReplicas)
# makes the disruption budget zero, permanently blocking rollout restarts.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: healing-app-pdb
  namespace: self-healing
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: healing-app
