apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-rules
  namespace: self-healing
data:
  deployment.yaml: |
    groups:
      # ── Error Rate Alerts ─────────────────────────────────────────────
      - name: error_rate
        interval: 30s
        rules:
          - alert: HighErrorRate
            expr: |
              (
                sum(rate(http_requests_total{status_code=~"5.."}[2m])) by (job)
                /
                sum(rate(http_requests_total[2m])) by (job)
              ) > 0.05
            for: 1m
            labels:
              severity: warning
              team: platform
            annotations:
              summary: "High error rate on {{ $labels.job }}"
              description: "Error rate is {{ $value | humanizePercentage }} (threshold: 5%) for job {{ $labels.job }}"
              runbook: "https://wiki.internal/runbooks/high-error-rate"

          - alert: CriticalErrorRate
            expr: |
              (
                sum(rate(http_requests_total{status_code=~"5.."}[2m])) by (job)
                /
                sum(rate(http_requests_total[2m])) by (job)
              ) > 0.20
            for: 30s
            labels:
              severity: critical
              team: platform
            annotations:
              summary: "CRITICAL error rate on {{ $labels.job }}"
              description: "Error rate is {{ $value | humanizePercentage }} (threshold: 20%). Auto-rollback may be triggered."
              runbook: "https://wiki.internal/runbooks/critical-error-rate"

      # ── Latency Alerts ────────────────────────────────────────────────
      - name: latency
        interval: 30s
        rules:
          - alert: HighLatencyP99
            expr: |
              histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket[5m])) by (le, endpoint))
              > 1.0
            for: 2m
            labels:
              severity: warning
              team: platform
            annotations:
              summary: "P99 latency high on {{ $labels.endpoint }}"
              description: "P99 latency is {{ $value | humanizeDuration }} (threshold: 1s) for {{ $labels.endpoint }}"

          - alert: CriticalLatencyP99
            expr: |
              histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket[5m])) by (le, endpoint))
              > 5.0
            for: 1m
            labels:
              severity: critical
              team: platform
            annotations:
              summary: "CRITICAL P99 latency on {{ $labels.endpoint }}"
              description: "P99 latency is {{ $value | humanizeDuration }} (threshold: 5s)"

      # ── Availability Alerts ───────────────────────────────────────────
      - name: availability
        interval: 15s
        rules:
          - alert: AppDown
            expr: app_availability == 0
            for: 1m
            labels:
              severity: critical
              team: platform
            annotations:
              summary: "Application is DOWN"
              description: "{{ $labels.job }} has been unavailable for more than 1 minute"

          - alert: PodNotReady
            expr: |
              kube_pod_status_ready{namespace="self-healing", condition="true"} == 0
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "Pod {{ $labels.pod }} is not ready"
              description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} has been unready for >2m"

          - alert: DeploymentReplicasMismatch
            expr: |
              kube_deployment_spec_replicas{namespace="self-healing"}
              != kube_deployment_status_available_replicas{namespace="self-healing"}
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Deployment {{ $labels.deployment }} replica mismatch"
              description: "Expected {{ $value }} replicas but some are unavailable for >5m"

      # ── Resource Alerts ───────────────────────────────────────────────
      - name: resources
        interval: 60s
        rules:
          - alert: HighCPU
            expr: |
              sum(rate(container_cpu_usage_seconds_total{namespace="self-healing", container="healing-app"}[5m]))
              by (pod)
              / sum(kube_pod_container_resource_limits{namespace="self-healing", resource="cpu", container="healing-app"})
              by (pod) > 0.85
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High CPU on {{ $labels.pod }}"
              description: "CPU usage is {{ $value | humanizePercentage }} of limit"

          - alert: HighMemory
            expr: |
              container_memory_working_set_bytes{namespace="self-healing", container="healing-app"}
              / kube_pod_container_resource_limits{namespace="self-healing", resource="memory", container="healing-app"}
              > 0.90
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High memory on {{ $labels.pod }}"
              description: "Memory usage is {{ $value | humanizePercentage }} of limit"

      # ── Argo Rollout Alerts ───────────────────────────────────────────
      - name: argo_rollouts
        interval: 30s
        rules:
          - alert: RolloutDegraded
            expr: |
              kube_customresource_status_condition{
                customresource_kind="Rollout",
                namespace="self-healing",
                condition="Degraded",
                status="True"
              } == 1
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Argo Rollout degraded: {{ $labels.customresource_name }}"
              description: "The rollout {{ $labels.customresource_name }} is in a Degraded state"

          - alert: RolloutPaused
            expr: |
              kube_customresource_status_condition{
                customresource_kind="Rollout",
                namespace="self-healing",
                condition="Paused",
                status="True"
              } == 1
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Argo Rollout paused for >10m: {{ $labels.customresource_name }}"
              description: "Manual intervention may be required to advance or abort the rollout"
