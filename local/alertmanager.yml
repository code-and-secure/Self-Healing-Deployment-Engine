global:
  resolve_timeout: 5m

route:
  group_by: [alertname, severity]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: console

  routes:
    - match:
        severity: critical
      receiver: console
      group_wait: 10s

receivers:
  - name: console
    # For local testing: alerts appear in AlertManager UI at http://localhost:9093
    # To enable Slack, uncomment and add your webhook:
    # slack_configs:
    #   - api_url: "https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK"
    #     channel: "#alerts"
    #     send_resolved: true
    #     title: "[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}"
    #     text: "{{ range .Alerts }}{{ .Annotations.description }}{{ end }}"
