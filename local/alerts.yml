groups:
  - name: app_alerts
    rules:
      - alert: HighErrorRate
        expr: |
          (
            sum(rate(http_requests_total{status_code=~"5.."}[2m]))
            /
            sum(rate(http_requests_total[2m]))
          ) > 0.05
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "High error rate detected"
          description: "Error rate is above 5%"

      - alert: CriticalErrorRate
        expr: |
          (
            sum(rate(http_requests_total{status_code=~"5.."}[2m]))
            /
            sum(rate(http_requests_total[2m]))
          ) > 0.20
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "CRITICAL error rate"
          description: "Error rate above 20% — auto-remediation triggered"

      - alert: HighLatency
        expr: |
          histogram_quantile(0.99,
            sum(rate(http_request_duration_seconds_bucket[5m])) by (le)
          ) > 1.0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High P99 latency"
          description: "P99 latency is above 1 second"

      - alert: AnomalyDetected
        expr: anomaly_detected == 1
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "ML anomaly detected"
          description: "Isolation Forest flagged current metrics as anomalous"
