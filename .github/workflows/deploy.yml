name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_APP: ghcr.io/code-and-secure/self-healing-deployment-engine/healing-app
  IMAGE_ML:  ghcr.io/code-and-secure/self-healing-deployment-engine/anomaly-detector
  SERVER_IP: 18.143.224.244

jobs:
  # ── Job 0: Bootstrap server (runs only if k3s is not installed yet) ─────────
  bootstrap-server:
    name: Bootstrap Server (one-time)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Add server SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ env.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Check if k3s is already installed on server
        id: check_k3s
        run: |
          INSTALLED=$(ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            ${{ secrets.SERVER_USER }}@${{ env.SERVER_IP }} \
            "command -v k3s &>/dev/null && kubectl get ns argocd &>/dev/null 2>&1 && echo yes || echo no")
          echo "installed=${INSTALLED}" >> $GITHUB_OUTPUT

      - name: Clone repo and run server-setup.sh (first time only)
        if: steps.check_k3s.outputs.installed == 'no'
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            ${{ secrets.SERVER_USER }}@${{ env.SERVER_IP }} \
            bash -s << 'ENDSSH'
              set -euo pipefail
              REPO_URL="https://github.com/${{ github.repository }}"
              REPO_DIR="$HOME/$(basename "$REPO_URL" .git)"

              echo "==> Cloning repo..."
              rm -rf "$REPO_DIR"
              git clone "$REPO_URL" "$REPO_DIR"
              cd "$REPO_DIR"

              echo "==> Running server-setup.sh..."
              bash scripts/server-setup.sh "$REPO_URL"
          ENDSSH

      - name: Server already bootstrapped — skipping
        if: steps.check_k3s.outputs.installed == 'yes'
        run: echo "k3s already installed on ${{ env.SERVER_IP }} — skipping bootstrap"

  # ── Job 1: Build & push Docker images ──────────────────────────────────────
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: bootstrap-server
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ github.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push healing-app
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.IMAGE_APP }}:${{ github.sha }}
            ${{ env.IMAGE_APP }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push anomaly-detector
        uses: docker/build-push-action@v5
        with:
          context: ./ml
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.IMAGE_ML }}:${{ github.sha }}
            ${{ env.IMAGE_ML }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 2: Update image tags in manifests ──────────────────────────────────
  # Only runs on push to main (not PRs)
  update-manifests:
    name: Update Image Tags in Manifests
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update healing-app image tag
        run: |
          NEW_IMAGE="${{ env.IMAGE_APP }}:${{ github.sha }}"
          # k8s/deployment.yaml — used for initial bootstrap
          sed -i "s|image: .*healing-app.*|image: ${NEW_IMAGE}|g" k8s/deployment.yaml
          # argo-rollouts/rollout.yaml — used for all canary deployments
          sed -i "s|image: .*healing-app.*|image: ${NEW_IMAGE}|g" argo-rollouts/rollout.yaml

      - name: Update anomaly-detector image tag
        run: |
          NEW_IMAGE="${{ env.IMAGE_ML }}:${{ github.sha }}"
          sed -i "s|image: .*anomaly-detector.*|image: ${NEW_IMAGE}|g" ml/deployment.yaml

      - name: Commit and push updated manifests
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/deployment.yaml argo-rollouts/rollout.yaml ml/deployment.yaml
          git diff --cached --quiet || git commit -m "ci: bump image tags to ${{ github.sha }}"
          git push

  # ── Job 3: Trigger ArgoCD sync via SSH ────────────────────────────────────
  sync-argocd:
    name: Trigger ArgoCD Sync
    runs-on: ubuntu-latest
    needs: update-manifests
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Add server SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ env.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Sync ArgoCD apps on server
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.SERVER_USER }}@${{ env.SERVER_IP }} \
            "argocd app sync self-healing-engine --insecure --timeout 120 && \
             argocd app sync self-healing-monitoring --insecure --timeout 60 && \
             argocd app wait self-healing-engine --insecure --health --timeout 300 && \
             echo 'ArgoCD sync complete'"

  # ── Job 4: Watch rollout progress via SSH ──────────────────────────────────
  watch-rollout:
    name: Monitor Canary Rollout
    runs-on: ubuntu-latest
    needs: sync-argocd
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Add server SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ env.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Watch rollout on server
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.SERVER_USER }}@${{ env.SERVER_IP }} \
            "kubectl argo rollouts status healing-app -n self-healing --timeout 15m --watch || \
             { STATUS=\$(kubectl argo rollouts get rollout healing-app -n self-healing -o jsonpath='{.status.phase}'); \
               echo \"Rollout ended: \${STATUS}\"; \
               [[ \"\${STATUS}\" == 'Degraded' || \"\${STATUS}\" == 'Error' ]] && exit 1 || exit 0; }"
