apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: smoke-test
  namespace: self-healing
spec:
  metrics:
    - name: smoke-test-job
      provider:
        job:
          spec:
            backoffLimit: 0
            template:
              spec:
                restartPolicy: Never
                containers:
                  - name: smoke-test
                    image: curlimages/curl:8.7.1
                    command:
                      - sh
                      - -c
                      - |
                        set -e
                        echo "Running smoke tests..."
                        curl -sf http://healing-app.self-healing/healthz
                        curl -sf http://healing-app.self-healing/readyz
                        curl -sf http://healing-app.self-healing/api/data
                        echo "All smoke tests passed"
