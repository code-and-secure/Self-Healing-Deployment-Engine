apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: healing-app
  namespace: self-healing
  labels:
    app: healing-app
  annotations:
    notifications.argoproj.io/subscribe.on-rollout-completed.slack: deployments
    notifications.argoproj.io/subscribe.on-rollout-degraded.slack: alerts
    notifications.argoproj.io/subscribe.on-analysis-error.slack: alerts
spec:
  replicas: 3
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: healing-app

  template:
    metadata:
      labels:
        app: healing-app
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: healing-app
          image: ghcr.io/code-and-secure/self-healing-deployment-engine/healing-app:fc898bfd1810575a322096d9aab1536c6af3e945
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080

          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

          startupProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 12

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name

          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]

          volumeMounts:
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: tmp
          emptyDir: {}

  # ── Canary Strategy with Auto-Rollback ─────────────────────────────────
  strategy:
    canary:
      # Services: stable traffic stays on canaryService=0%, stable=100% until promoted
      canaryService: healing-app-canary
      stableService: healing-app-stable

      # Traffic shaping via Nginx ingress
      trafficRouting:
        nginx:
          stableIngress: healing-app-stable

      # Auto-rollback: revert immediately if any analysis fails
      autoPromotionEnabled: false    # Require all analysis gates to pass

      steps:
        # Step 1: Send 5% traffic to canary, run smoke test
        - setWeight: 5
        - analysis:
            templates:
              - templateName: smoke-test
        - pause:
            duration: 2m

        # Step 2: 20% traffic — first real metrics gate
        - setWeight: 20
        - analysis:
            templates:
              - templateName: error-rate-analysis
            args:
              - name: service-name
                value: healing-app
        - pause:
            duration: 3m

        # Step 3: 50% traffic — midpoint gate
        - setWeight: 50
        - analysis:
            templates:
              - templateName: error-rate-analysis
            args:
              - name: service-name
                value: healing-app
        - pause:
            duration: 5m

        # Step 4: 80% traffic — near-full gate
        - setWeight: 80
        - analysis:
            templates:
              - templateName: error-rate-analysis
            args:
              - name: service-name
                value: healing-app
        - pause:
            duration: 5m

        # Step 5: 100% — full promotion (Argo promotes automatically on success)
        - setWeight: 100

      # Background analysis runs throughout all steps
      analysis:
        templates:
          - templateName: error-rate-analysis
        args:
          - name: service-name
            value: healing-app
        startingStep: 2     # Begin background analysis from step 2 onward
---
# Stable service receives all traffic initially
apiVersion: v1
kind: Service
metadata:
  name: healing-app-stable
  namespace: self-healing
  labels:
    app: healing-app
    track: stable
spec:
  selector:
    app: healing-app
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
# Canary service receives only canary pod traffic
apiVersion: v1
kind: Service
metadata:
  name: healing-app-canary
  namespace: self-healing
  labels:
    app: healing-app
    track: canary
spec:
  selector:
    app: healing-app
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: healing-app-stable
  namespace: self-healing
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
spec:
  rules:
    - host: healing-app.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: healing-app-stable
                port:
                  number: 80
