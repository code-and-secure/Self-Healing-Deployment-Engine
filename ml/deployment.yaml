apiVersion: v1
kind: ServiceAccount
metadata:
  name: anomaly-detector
  namespace: self-healing
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: anomaly-detector
  namespace: self-healing
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["rollouts", "rollouts/status"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: anomaly-detector
  namespace: self-healing
subjects:
  - kind: ServiceAccount
    name: anomaly-detector
    namespace: self-healing
roleRef:
  kind: Role
  name: anomaly-detector
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: anomaly-detector
  namespace: self-healing
  labels:
    app: anomaly-detector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: anomaly-detector
  template:
    metadata:
      labels:
        app: anomaly-detector
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: anomaly-detector
      containers:
        - name: anomaly-detector
          image: ghcr.io/code-and-secure/self-healing-deployment-engine/anomaly-detector:edf0845cebb2f56f9d72f059abeb1c8022b284ad
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8090
              name: http
          env:
            - name: PROMETHEUS_URL
              value: "http://prometheus.self-healing:9090"
            - name: SCRAPE_INTERVAL
              value: "30"
            - name: ANOMALY_THRESHOLD
              value: "-0.15"
            - name: WARMUP_SAMPLES
              value: "20"
            - name: MODEL_PATH
              value: "/models/isolation_forest.pkl"
          volumeMounts:
            - name: models
              mountPath: /models
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /status
              port: 8090
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: anomaly-detector-models
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: anomaly-detector-models
  namespace: self-healing
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: anomaly-detector
  namespace: self-healing
spec:
  selector:
    app: anomaly-detector
  ports:
    - name: http
      port: 8090
      targetPort: 8090
