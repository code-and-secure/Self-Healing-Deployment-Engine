apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-slack-secret
  namespace: self-healing
type: Opaque
stringData:
  # Replace with your actual Slack webhook URL
  slack_webhook_url: "https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: self-healing
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m
      slack_api_url_file: /etc/alertmanager/secrets/slack_webhook_url

    # ── Routing tree ──────────────────────────────────────────────────────
    route:
      group_by: [alertname, severity, job]
      group_wait: 30s          # Wait before sending first notification
      group_interval: 5m       # Wait before sending updates for same group
      repeat_interval: 4h      # Re-notify if still firing after this time
      receiver: slack-warnings

      routes:
        # Critical alerts → immediate page + Slack
        - match:
            severity: critical
          receiver: slack-critical
          group_wait: 10s
          repeat_interval: 1h
          continue: false

        # Argo Rollout degraded → immediate critical channel
        - match:
            alertname: RolloutDegraded
          receiver: slack-critical
          group_wait: 0s
          repeat_interval: 30m

        # Warning alerts → warnings channel
        - match:
            severity: warning
          receiver: slack-warnings
          group_wait: 1m
          repeat_interval: 2h

    # ── Inhibition rules ──────────────────────────────────────────────────
    inhibit_rules:
      # Suppress warnings when critical alert for same job is already firing
      - source_match:
          severity: critical
        target_match:
          severity: warning
        equal: [alertname, job]

    # ── Receivers ─────────────────────────────────────────────────────────
    receivers:
      - name: slack-critical
        slack_configs:
          - channel: "#alerts-critical"
            send_resolved: true
            icon_emoji: ":red_circle:"
            username: "Self-Healing Engine"
            title: |-
              [{{ .Status | toUpper }}{{ if eq .Status "firing" }} :fire:{{ end }}]
              {{ .CommonLabels.alertname }}
            title_link: "{{ template \"slack.default.titlelink\" . }}"
            text: >-
              {{ range .Alerts }}
              *Alert:* {{ .Labels.alertname }} — {{ .Labels.severity }}
              *Summary:* {{ .Annotations.summary }}
              *Description:* {{ .Annotations.description }}
              *Runbook:* {{ .Annotations.runbook }}
              *Started:* {{ .StartsAt | since }}
              {{ end }}
            actions:
              - type: button
                text: "View in Prometheus"
                url: "http://prometheus.self-healing:9090/alerts"
              - type: button
                text: "View Grafana"
                url: "http://grafana.self-healing:3000"
              - type: button
                text: "Manual Rollback"
                url: "http://argo-rollouts.self-healing:3100"

      - name: slack-warnings
        slack_configs:
          - channel: "#alerts-warnings"
            send_resolved: true
            icon_emoji: ":warning:"
            username: "Self-Healing Engine"
            title: |-
              [{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}
            text: >-
              {{ range .Alerts }}
              *Alert:* {{ .Labels.alertname }}
              *Summary:* {{ .Annotations.summary }}
              *Description:* {{ .Annotations.description }}
              {{ end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: self-healing
  labels:
    app: alertmanager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
    spec:
      containers:
        - name: alertmanager
          image: prom/alertmanager:v0.27.0
          args:
            - "--config.file=/etc/alertmanager/alertmanager.yml"
            - "--storage.path=/alertmanager"
            - "--cluster.advertise-address=$(POD_IP):9094"
          ports:
            - containerPort: 9093
              name: web
            - containerPort: 9094
              name: cluster
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          volumeMounts:
            - name: config
              mountPath: /etc/alertmanager
            - name: secrets
              mountPath: /etc/alertmanager/secrets
              readOnly: true
            - name: storage
              mountPath: /alertmanager
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9093
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: alertmanager-config
        - name: secrets
          secret:
            secretName: alertmanager-slack-secret
        - name: storage
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: self-healing
spec:
  selector:
    app: alertmanager
  ports:
    - name: web
      port: 9093
      targetPort: 9093
  type: ClusterIP
