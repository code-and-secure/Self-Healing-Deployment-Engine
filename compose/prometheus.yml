global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: healing-app
    static_configs:
      - targets: ["app:8080"]
    metrics_path: /metrics

  - job_name: anomaly-detector
    static_configs:
      - targets: ["anomaly-detector:8090"]
    metrics_path: /metrics
