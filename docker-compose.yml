version: "3.9"

services:

  # ── Application ──────────────────────────────────────────────────────────
  app:
    build: ./app
    container_name: healing-app
    ports:
      - "8080:8080"
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - monitoring

  # ── Anomaly Detector (ML) ────────────────────────────────────────────────
  anomaly-detector:
    build: ./ml
    container_name: anomaly-detector
    ports:
      - "8090:8090"
    environment:
      - PROMETHEUS_URL=http://prometheus:9090
      - SCRAPE_INTERVAL=30
      - ANOMALY_THRESHOLD=-0.15
      - WARMUP_SAMPLES=10
      - MODEL_PATH=/models/isolation_forest.pkl
    volumes:
      - ml-models:/models
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - monitoring

  # ── Prometheus ───────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./compose/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./compose/alerts.yml:/etc/prometheus/alerts.yml
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    restart: unless-stopped
    networks:
      - monitoring

  # ── Grafana ──────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.0.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./compose/grafana-datasource.yml:/etc/grafana/provisioning/datasources/prometheus.yml
      - ./monitoring/grafana/dashboard.json:/etc/grafana/provisioning/dashboards/self-healing.json
      - ./compose/grafana-dashboard-provider.yml:/etc/grafana/provisioning/dashboards/provider.yml
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - monitoring

  # ── AlertManager ─────────────────────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./compose/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    restart: unless-stopped
    networks:
      - monitoring

volumes:
  prometheus-data:
  grafana-data:
  ml-models:

networks:
  monitoring:
    driver: bridge
